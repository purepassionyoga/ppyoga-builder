<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pose Library · Pure Passion Yoga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --rose:#C2848F; --roseTitle:#C9A6AC; --roseDeep:#A66472; --sage:#8F9A63;
    --taupe:#9C8579; --body:#6C7682; --paper:#fff; --stage:#FBF8F6; --line:#EFE6E8;
    --lineDk:#E2D7D9; --chipBg:#F6ECEF; --chipFg:#B06B79; --sageBg:#EEF1E4; --sageFg:#6E7A46;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--stage);color:var(--body);font-family:'Poppins',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .serif{font-family:'Playfair Display',Georgia,serif}
  a{color:inherit;text-decoration:none}

  header{background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .bar{max-width:1200px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{font-family:'Playfair Display',serif;font-weight:700;font-size:22px;color:var(--roseDeep);letter-spacing:.02em}
  nav{display:flex;gap:18px;font-size:13px;color:var(--taupe)}
  nav a.active{color:var(--rose);font-weight:600}

  .wrap{max-width:1200px;margin:0 auto;padding:24px}
  .search{width:100%;padding:12px 16px;border:1px solid var(--lineDk);border-radius:12px;font:inherit;font-size:14px;outline:none;background:#fff;color:#2A2330;margin-bottom:18px}
  .frow{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .flabel{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--taupe);width:96px;flex:0 0 auto;padding-top:7px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;flex:1}
  .chip{font-size:12px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--body);cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--rose)}
  .chip.on{background:var(--rose);color:#fff;border-color:var(--rose)}

  .count{color:var(--taupe);font-size:13px;margin:14px 0 18px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(196px,1fr));gap:16px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:.18s;position:relative}
  .card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(166,100,114,.12);border-color:var(--lineDk)}
  .thumb{height:140px;display:flex;align-items:center;justify-content:center;background:#fff;border-bottom:1px solid var(--line);font-size:50px}
  .thumb img{max-height:100%;max-width:100%;object-fit:contain}
  .cbody{padding:12px 14px 14px}
  .cname{font-family:'Playfair Display',serif;font-weight:600;font-size:16px;color:var(--rose);line-height:1.2}
  .csans{font-family:'Playfair Display',serif;font-style:italic;color:var(--sage);font-size:13px;margin-top:2px}
  .crow{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:11.5px;color:var(--taupe)}
  .badge{font-size:11px;padding:2px 9px;border-radius:999px;font-weight:500}
  .heart{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:999px;background:rgba(255,255,255,.92);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--rose);font-size:15px}
  .heart.on{background:var(--rose);color:#fff;border-color:var(--rose)}

  .state{padding:60px 20px;text-align:center;color:var(--taupe)}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(58,38,44,.42);display:flex;align-items:flex-start;justify-content:center;padding:14px;overflow:auto;z-index:50}
  .modal{background:#fff;max-width:920px;width:100%;border-radius:26px;margin:16px 0;overflow:hidden;animation:in .28s cubic-bezier(.2,.7,.2,1)}
  @keyframes in{from{opacity:0;transform:translateY(8px) scale(.99)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.modal{animation:none}}
  .mtop{position:sticky;top:0;background:rgba(255,255,255,.93);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);display:flex;justify-content:flex-end;padding:12px 18px;z-index:2}
  .close{background:#CDA0A6;color:#fff;border:none;font:inherit;font-size:13px;padding:7px 16px;border-radius:999px;cursor:pointer}
  .mbody{padding:8px 28px 44px}
  .mhead{text-align:center;padding-top:8px}
  .mtitle{font-family:'Playfair Display',serif;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--roseTitle);font-size:40px;margin:0}
  .msans{font-family:'Playfair Display',serif;font-style:italic;color:var(--sage);font-size:22px;margin-top:4px}
  .mpron{font-family:'Playfair Display',serif;color:var(--taupe);font-size:17px;margin-top:2px}
  .malt{font-size:12px;color:var(--taupe);margin-top:10px}
  .facts{display:flex;justify-content:center;flex-wrap:wrap;margin:24px 0}
  .fact{padding:0 22px;text-align:center;border-left:1px solid var(--line)}
  .fact:first-child{border-left:none}
  .fact .l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--taupe)}
  .fact .v{font-size:14px;color:#2A2330;font-weight:500;margin-top:2px}
  .intro{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center}
  .intro p{font-size:15px;line-height:1.7;color:var(--body)}
  .fig{background:#FAF5F2;border:1px solid var(--line);border-radius:18px;min-height:230px;display:flex;align-items:center;justify-content:center;font-size:90px}
  .fig img{max-height:230px;max-width:100%;object-fit:contain}
  .rule{border-top:1px solid var(--line);margin:30px 0}
  .secgrid{display:grid;grid-template-columns:1fr 1fr;gap:30px 48px}
  .sec h3{font-family:'Playfair Display',serif;color:var(--rose);font-size:23px;margin:0 0 12px}
  .sec, .sec p, .sec li{font-size:14px;line-height:1.65;color:var(--body)}
  .sec.full{grid-column:1/-1}
  .sec p{margin:0 0 10px}
  ul.clean{list-style:none;padding:0;margin:0}
  ul.clean li{display:flex;gap:10px;margin-bottom:8px}
  ul.clean li::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--rose);margin-top:8px;flex:0 0 auto}
  ol.steps{list-style:none;padding:0;margin:0;counter-reset:s}
  ol.steps li{display:flex;gap:12px;margin-bottom:10px;counter-increment:s}
  ol.steps li::before{content:counter(s);font-family:'Playfair Display',serif;color:var(--roseDeep);font-size:18px;width:18px;flex:0 0 auto}
  .tags{display:flex;flex-wrap:wrap;gap:7px}
  .tag{font-size:12px;padding:4px 11px;border-radius:999px;background:var(--chipBg);color:var(--chipFg)}
  .tag.sage{background:var(--sageBg);color:var(--sageFg)}
  .affirm{margin:36px auto 0;max-width:640px;background:var(--chipBg);border-radius:18px;text-align:center;padding:26px}
  .affirm .l{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--roseDeep)}
  .affirm .q{font-family:'Playfair Display',serif;font-style:italic;color:var(--roseDeep);font-size:24px;margin-top:8px}
  .vary{margin-top:44px;text-align:center}
  .vary h2{font-family:'Playfair Display',serif;text-transform:uppercase;letter-spacing:.18em;color:var(--roseTitle);font-size:28px;margin:0 0 16px}
  .vchips{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:640px;margin:0 auto}
  .vchip{font-size:14px;padding:8px 16px;border-radius:12px;background:#FAF5F2;border:1px solid var(--line);color:var(--body)}
  @media (max-width:640px){.intro,.secgrid{grid-template-columns:1fr}.mtitle{font-size:30px}.flabel{width:100%}}
</style>
</head>

External Rotation", "Hip Extension", "Spinal Flexion", "Postural Alignment", "Grounding"], "short_description": "Pigeon Pose is a deep hip-opening posture that stretches the glutes and hip rotators while promoting relaxation and release. It is commonly used in cool-down sequences and restorative practices.", "anatomy_breakdown": "Pigeon Pose creates deep external rotation in the front hip while extending the back leg behind. The glutes and hip rotators of the front leg lengthen, while the hip flexors of the back leg stretch.\n\nThe pelvis moves toward the floor, supported by props if needed. The spine can remain upright or fold forward, increasing intensity in the hips.\n\nThe pose targets deep connective tissues and is often associated with both physical and emotional release.", "instructions": ["From Downward Dog, bring one knee forward toward the wrist.", "Extend the back leg straight behind you.", "Square the hips toward the front of the mat.", "Lower the hips toward the floor or support them with a block.", "Stay upright or fold forward over the front leg."], "benefits": "Pigeon Pose deeply stretches the hips and glutes while improving flexibility and mobility. It helps release tension stored in the hips and can promote relaxation.\n\nThe pose is also effective for counteracting tightness from sitting and can support emotional release.", "teaching_cues": ["From Downward Dog, bring one knee forward toward the wrist", "Extend the back leg straight behind", "Square the hips toward the front", "Lower the hips toward the floor", "Stay upright or fold forward over the front leg"], "breath_cues": ["Inhale to lengthen the spine.", "Exhale to soften and release into the hips."], "contraindications": "Students with knee injuries should avoid this pose or modify heavily. Those with hip or lower back discomfort should use props and avoid forcing the stretch.", "modifications": ["Place a block or blanket under the front hip.", "Keep the torso upright.", "Use a bolster under the chest in forward fold."], "advanced_variations": ["King Pigeon Pose", "Pigeon with backbend", "Deep forward fold variation"], "affirmation": "I release tension and create space within."}];
let POSES=[], fav=new Set();
const F={search:"",category:"",difficulty:"",body:"",style:""};
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const arr=v=>Array.isArray(v)?v:[];
const paras=t=>(t||"").split(/\n{2,}/).map(s=>s.trim()).filter(Boolean);
const badgeColor=d=>/Advanced/.test(d)&&!/Intermediate–/.test(d)?["#FBE6DF","#C44E37"]:/Intermediate/.test(d)?["#F7EFD9","#B98A1F"]:["#E5F0EC","#2E7D6B"];

async function load(){
  try{
    const r=await fetch(`${SB}/rest/v1/poses?select=*&status=eq.published&order=canonical_pose_id`,{headers:{apikey:KEY,Authorization:"Bearer "+KEY}});
    if(!r.ok) throw new Error("HTTP "+r.status);
    POSES=await r.json();
    document.getElementById("state").style.display="none";
    buildFilters(); render();
  }catch(e){
    POSES=SAMPLE;
    document.getElementById("state").innerHTML="<b>Preview mode</b> — showing "+SAMPLE.length+" sample poses. Deployed to a real URL, this loads your full live library of 50.";
    document.getElementById("state").style.display="block";
    buildFilters(); render();
  }
}
function uniq(getter){const m=new Map();POSES.forEach(p=>{const v=getter(p);(Array.isArray(v)?v:[v]).filter(Boolean).forEach(x=>m.set(x,(m.get(x)||0)+1));});return [...m.entries()].sort((a,b)=>a[0].localeCompare(b[0]));}
function buildFilters(){
  const rows=[
    ["Category","category",uniq(p=>p.category)],
    ["Difficulty","difficulty",uniq(p=>p.difficulty_level)],
    ["Body Focus","body",uniq(p=>p.body_focus)],
    ["Yoga Style","style",uniq(p=>p.yoga_styles)],
  ];
  document.getElementById("filters").innerHTML=rows.map(([label,key,vals])=>`
    <div class="frow"><div class="flabel">${label}</div><div class="chips">
      <span class="chip ${F[key]===""?"on":""}" data-k="${key}" data-v="">All</span>
      ${vals.map(([v,c])=>`<span class="chip ${F[key]===v?"on":""}" data-k="${key}" data-v="${esc(v)}">${esc(v)} (${c})</span>`).join("")}
    </div></div>`).join("");
  document.querySelectorAll(".chip").forEach(el=>el.onclick=()=>{F[el.dataset.k]=el.dataset.v;buildFilters();render();});
}
function match(p){
  if(F.category&&p.category!==F.category)return false;
  if(F.difficulty&&p.difficulty_level!==F.difficulty)return false;
  if(F.body&&!arr(p.body_focus).includes(F.body))return false;
  if(F.style&&!arr(p.yoga_styles).includes(F.style))return false;
  if(F.search){const q=F.search.toLowerCase();if(!((p.name||"").toLowerCase().includes(q)||(p.sanskrit_name||"").toLowerCase().includes(q)))return false;}
  return true;
}
function render(){
  const list=POSES.filter(match);
  document.getElementById("count").textContent=`${list.length} pose${list.length===1?"":"s"}`;
  document.getElementById("grid").innerHTML=list.map((p,i)=>{
    const idx=POSES.indexOf(p);const [bg,fg]=badgeColor(p.difficulty_level||"");
    const thumb=p.image_url?`<img src="${esc(p.image_url)}" alt="${esc(p.name)}">`:(p.emoji||"🧘");
    return `<div class="card" data-i="${idx}">
      <div class="heart ${fav.has(idx)?"on":""}" data-fav="${idx}">♥</div>
      <div class="thumb">${thumb}</div>
      <div class="cbody">
        <div class="cname">${esc(p.name)}</div>
        <div class="csans">${esc(p.sanskrit_name||"")}</div>
        <div class="crow"><span>${esc(p.category||"")}</span>
          ${p.difficulty_level?`<span class="badge" style="background:${bg};color:${fg}">${esc(p.difficulty_level)}</span>`:""}</div>
      </div></div>`;
  }).join("");
  document.querySelectorAll(".card").forEach(el=>el.onclick=e=>{if(e.target.dataset.fav!==undefined)return;openDetail(POSES[+el.dataset.i]);});
  document.querySelectorAll(".heart").forEach(el=>el.onclick=e=>{e.stopPropagation();const i=+el.dataset.fav;fav.has(i)?fav.delete(i):fav.add(i);render();});
}
function chips(items,sage){return arr(items).length?`<div class="tags">${arr(items).map(x=>`<span class="tag ${sage?"sage":""}">${esc(x)}</span>`).join("")}</div>`:'<span style="color:var(--taupe)">—</span>';}
function bullets(items){return arr(items).length?`<ul class="clean">${arr(items).map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:"";}
function steps(items){return arr(items).length?`<ol class="steps">${arr(items).map(x=>`<li>${esc(x)}</li>`).join("")}</ol>`:"";}
function sec(title,html,full){return `<div class="sec ${full?"full":""}"><h3>${title}</h3>${html}</div>`;}
function openDetail(p){
  const fig=p.image_url?`<img src="${esc(p.image_url)}" alt="${esc(p.name)}">`:(p.emoji||"🧘");
  const facts=[["Category",p.category],["Difficulty",p.difficulty_level],["Primary Movement",p.primary_movement]].filter(f=>f[1]);
  const html=`<div class="overlay" id="ov"><div class="modal" onclick="event.stopPropagation()">
    <div class="mtop"><button class="close" onclick="closeModal()">Close</button></div>
    <div class="mbody">
      <div class="mhead">
        <h1 class="mtitle">${esc(p.name)}</h1>
        <div class="msans">${esc(p.sanskrit_name||"")}</div>
        <div class="mpron">${esc(p.pronunciation||"")}</div>
        ${arr(p.alternate_names).length?`<div class="malt">Also known as: ${arr(p.alternate_names).map(esc).join(" · ")}</div>`:""}
      </div>
      <div class="facts">${facts.map(f=>`<div class="fact"><div class="l">${esc(f[0])}</div><div class="v">${esc(f[1])}</div></div>`).join("")}</div>
      <div class="intro"><p>${esc(p.short_description||"")}</p><div class="fig">${fig}</div></div>
      <div class="rule"></div>
      ${p.anatomy_breakdown?sec("Anatomy Breakdown",paras(p.anatomy_breakdown).map(x=>`<p>${esc(x)}</p>`).join(""),true):""}
      <div class="secgrid" style="margin-top:24px">
        ${arr(p.instructions).length?sec("Alignment Breakdown",steps(p.instructions)):""}
        ${p.benefits?sec("Benefits",paras(p.benefits).map(x=>`<p>${esc(x)}</p>`).join("")):""}
        ${arr(p.yoga_styles).length?sec("Commonly used in these styles",chips(p.yoga_styles,true),true):""}
        ${arr(p.teaching_cues).length?sec("Teaching Cue",bullets(p.teaching_cues)):""}
        ${arr(p.breath_cues).length?sec("Breath Cue",bullets(p.breath_cues)):""}
        ${p.contraindications?sec("Contraindication",bullets((p.contraindications||"").split(/\n+/).filter(Boolean))):""}
        ${arr(p.modifications).length?sec("Modifications",bullets(p.modifications)):""}
        ${p.difficulty_level?sec("Difficulty Level",`<span style="color:var(--sage);font-weight:500">${esc(p.difficulty_level)}</span>`):""}
        ${arr(p.chakras).length?sec("Chakra",chips(p.chakras)):""}
        ${arr(p.body_focus).length?sec("Body Areas",chips(p.body_focus)):""}
        ${arr(p.muscle_groups).length?sec("Muscle Groups",chips(p.muscle_groups,true)):""}
        ${arr(p.movement_actions).length?sec("Movement Actions",chips(p.movement_actions)):""}
        ${arr(p.benefit_tags).length?sec("Focus & Benefits",chips(p.benefit_tags)):""}
      </div>
      ${p.affirmation?`<div class="affirm"><div class="l">Affirmation</div><div class="q">“${esc(p.affirmation)}”</div></div>`:""}
      ${arr(p.advanced_variations).length?`<div class="vary"><h2>Pose Variations</h2><div class="vchips">${arr(p.advanced_variations).map(v=>`<span class="vchip">${esc(v)}</span>`).join("")}</div></div>`:""}
    </div></div></div>`;
  const root=document.getElementById("modalRoot");
  root.innerHTML=html;
  document.getElementById("ov").onclick=closeModal;
  document.body.style.overflow="hidden";
}
function closeModal(){document.getElementById("modalRoot").innerHTML="";document.body.style.overflow="";}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
document.getElementById("search").addEventListener("input",e=>{F.search=e.target.value;render();});
load();
</script>
</body>
</html>
