<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sequence Builder · Pure Passion Yoga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg:#F5F1F4; --card:#fff; --ink:#2C2238; --head:#3A2E48; --aub:#4A3A5A;
    --rose:#C8A0A6; --clayDk:#A87C83; --sage:#a8ad91; --jade:#2E7D6B; --amber:#B98A1F;
    --muted:#8A8090; --line:#ECE5EC; --lineDk:#DDD2DD; --field:#FBF9FB;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Poppins',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
  .serif{font-family:'Playfair Display',Georgia,serif}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  .hidden{display:none!important}
  .btn{background:var(--clayDk);color:#fff;border:none;padding:8px 14px;border-radius:9px;font-weight:500;font-size:13px}
  .btn:hover{background:#925266}
  .btn.ghost{background:#fff;color:var(--aub);border:1px solid var(--lineDk)}
  .btn.ghost:hover{border-color:var(--rose)}
  .btn.soon{background:#F2ECF2;color:#B3A8B8;border:1px solid var(--line)}
  .btn:disabled{opacity:.5}

  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .lcard{background:#fff;border:1px solid var(--line);border-radius:22px;padding:38px 34px;width:100%;max-width:380px;box-shadow:0 18px 50px rgba(74,58,90,.08)}
  .lcard h1{font-family:'Playfair Display',serif;color:var(--clayDk);font-size:26px;margin:0 0 4px;text-align:center}
  .lcard p{color:var(--muted);text-align:center;margin:0 0 24px;font-size:13px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--lineDk);border-radius:9px;background:var(--field);color:var(--ink);outline:none}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--rose)}
  .err{background:#FBE6DF;color:#A03A22;border-radius:9px;padding:9px 12px;font-size:13px;margin-bottom:12px}

  .top{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .topin{max-width:1320px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:14px}
  .brand{font-family:'Playfair Display',serif;font-weight:700;color:var(--clayDk);font-size:18px}
  .tag-admin{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 8px}
  .who{margin-left:auto;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:12px}

  .layout{max-width:1320px;margin:0 auto;padding:16px 20px 60px;display:grid;grid-template-columns:300px 1fr;gap:18px;align-items:start}
  @media (max-width:860px){.layout{grid-template-columns:1fr}}

  /* picker */
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;position:sticky;top:74px;max-height:calc(100vh - 92px);display:flex;flex-direction:column}
  .panel h3{font-family:'Playfair Display',serif;color:var(--head);margin:0 0 10px;font-size:16px}
  .psearch{width:100%;padding:8px 11px;border:1px solid var(--lineDk);border-radius:9px;background:var(--field);outline:none;margin-bottom:8px}
  .cats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
  .cat{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted)}
  .cat.on{background:var(--rose);color:#fff;border-color:var(--rose)}
  .plist{overflow:auto;flex:1;margin:0 -6px;padding:0 6px}
  .pitem{display:flex;gap:10px;align-items:flex-start;padding:8px;border-radius:10px;cursor:pointer}
  .pitem:hover{background:#FBF7FA}
  .pth{width:34px;height:34px;border-radius:8px;background:#F4EEF3;display:flex;align-items:center;justify-content:center;font-size:17px;overflow:hidden;flex:0 0 auto}
  .pth img{max-width:100%;max-height:100%;object-fit:contain}
  .pn{font-weight:500;color:var(--head);font-size:13px;line-height:1.2}
  .ps{color:var(--sage);font-style:italic;font-size:11px}
  .pc{color:var(--muted);font-size:11px;margin-top:1px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .lv{font-size:10px;color:var(--amber);float:right}

  /* builder */
  .build{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px}
  .titlein{font-family:'Playfair Display',serif;font-size:24px;color:var(--clayDk);border:none;outline:none;width:100%;background:none;margin-bottom:4px}
  .meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
  .meta .full{grid-column:1/-1}
  .meta input,.meta select,.meta textarea{width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:9px;background:var(--field);outline:none}
  .bar{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin:12px 0;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .share{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:13px;margin:8px 0}

  .canvas{margin-top:14px;min-height:160px}
  .empty{border:2px dashed var(--lineDk);border-radius:14px;padding:48px 20px;text-align:center;color:var(--muted)}
  .empty .fl{font-size:30px}
  .empty h4{font-family:'Playfair Display',serif;font-style:italic;color:var(--rose);font-size:22px;margin:8px 0 4px;font-weight:500}
  .item{display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:9px}
  .item.drag{opacity:.4}
  .item.over{border-color:var(--rose);box-shadow:0 0 0 2px rgba(194,132,143,.2)}
  .handle{cursor:grab;color:var(--lineDk);font-size:18px;padding-top:4px;user-select:none}
  .ith{width:42px;height:42px;border-radius:9px;background:#F4EEF3;display:flex;align-items:center;justify-content:center;font-size:21px;overflow:hidden;flex:0 0 auto}
  .ith img{max-width:100%;max-height:100%;object-fit:contain}
  .ibody{flex:1;min-width:0}
  .iname{font-weight:500;color:var(--head)}
  .isan{color:var(--sage);font-style:italic;font-size:12px}
  .iopts{display:flex;gap:8px;align-items:center;margin-top:7px}
  .iopts input.notes{flex:1;padding:6px 9px;border:1px solid var(--line);border-radius:8px;background:var(--field);outline:none;font-size:13px}
  .iopts input.br{width:78px;padding:6px 9px;border:1px solid var(--line);border-radius:8px;background:var(--field);outline:none;font-size:13px}
  .rm{background:none;border:none;color:var(--clayDk);font-size:16px;padding:2px 6px}
  .section{background:#F6EFF4;border:1px dashed var(--rose);border-radius:12px;padding:9px 12px;margin-bottom:9px;display:flex;gap:10px;align-items:center}
  .section input{flex:1;border:none;background:none;outline:none;font-family:'Playfair Display',serif;font-style:italic;color:var(--clayDk);font-size:17px}
  .pos{color:var(--muted);font-size:11px;width:20px;text-align:right;padding-top:3px}
  .seqgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px}
  .seqcard{background:#fff;border:1px solid var(--line);border-radius:13px;padding:9px 9px 10px;display:flex;flex-direction:column;text-align:center;position:relative}
  .seqcard.over{border-color:var(--rose);box-shadow:0 0 0 2px rgba(194,132,143,.25)}
  .seqcard.drag{opacity:.4}
  .seqcard.section{grid-column:1/-1;flex-direction:row;align-items:center;gap:10px;text-align:left;background:#F6EFF4;border-style:dashed;border-color:var(--rose)}
  .seqcard.section input{flex:1;border:none;background:none;outline:none;font-family:'Playfair Display',serif;font-style:italic;color:var(--clayDk);font-size:16px}
  .sc-top{display:flex;align-items:center;justify-content:space-between}
  .sc-num{font-size:12px;color:var(--muted);font-weight:600}
  .sc-handle{cursor:grab;color:var(--lineDk);font-size:14px;user-select:none}
  .sc-rm{background:none;border:none;color:var(--clayDk);font-size:14px;cursor:pointer;line-height:1}
  .sc-th{height:72px;display:flex;align-items:center;justify-content:center;font-size:38px;margin:3px 0}
  .sc-th img{max-height:100%;max-width:100%;object-fit:contain}
  .sc-name{font-family:'Playfair Display',serif;color:var(--rose);font-size:14px;line-height:1.15}
  .sc-san{color:var(--sage);font-style:italic;font-size:11px;margin-top:1px}
  .sc-cue{color:var(--muted);font-size:11px;margin:5px 0 4px;min-height:28px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .sc-br{color:var(--amber);font-size:11px;font-weight:600;min-height:15px}
  .sc-edit{margin-top:6px;background:#F6EFF4;color:var(--clayDk);border:none;border-radius:8px;padding:5px 0;font-size:12px;cursor:pointer}
  .sc-edit:hover{background:#EFE2EC}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--head);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:80;opacity:0;transition:.25s}
  .toast.show{opacity:1}
  .ovl{position:fixed;inset:0;background:rgba(44,34,56,.4);z-index:60;display:flex;align-items:center;justify-content:center;padding:18px}
  .modal{background:#fff;border-radius:18px;width:100%;max-width:440px;max-height:80vh;overflow:auto;padding:20px}
  .modal h3{font-family:'Playfair Display',serif;color:var(--head);margin:0 0 12px}
  .savedrow{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer}
  .savedrow:hover{background:#FBF7FA}

  @media print{
    body{background:#fff}
    .top,.panel,.bar,.share,.handle,.rm,.sc-handle,.sc-rm,.sc-edit,#picker{display:none!important}
    .layout{display:block;padding:0}
    .build{border:none;padding:0}
    .item,.section{break-inside:avoid}
  }
</style>
</head>
<body>

<div id="login">
  <div class="lcard">
    <h1 class="serif">Pure Passion Yoga</h1>
    <p>Sequence Builder — teacher sign-in</p>
    <div id="loginErr" class="err hidden"></div>
    <div class="field"><label>Email</label><input id="email" type="email" autocomplete="username"/></div>
    <div class="field"><label>Password</label><input id="password" type="password" autocomplete="current-password"/></div>
    <button id="signin" class="btn" style="width:100%;margin-top:6px">Sign in</button>
  </div>
</div>

<div id="app" class="hidden">
  <div class="top"><div class="topin">
    <span class="brand">Pure Passion Yoga</span><span class="tag-admin">Sequence Builder</span>
    <span class="who"><span id="whoami"></span><button id="signout" class="btn ghost" style="padding:6px 12px">Sign out</button></span>
  </div></div>

  <div class="layout">
    <!-- PICKER -->
    <div class="panel" id="picker">
      <h3>Poses</h3>
      <input id="psearch" class="psearch" placeholder="Search poses…"/>
      <div id="cats" class="cats"></div>
      <div id="plist" class="plist"></div>
    </div>

    <!-- BUILDER -->
    <div class="build">
      <input id="m_name" class="titlein" placeholder="My Yoga Sequence"/>
      <div class="meta">
        <textarea id="m_description" class="full" rows="2" placeholder="Sequence description, intention, or theme… (optional)"></textarea>
        <input id="m_playlist" class="full" placeholder="🎵 Playlist link — Spotify, YouTube, Apple Music… (optional)"/>
        <input id="m_level" placeholder="Level (e.g. Beginner)"/>
        <input id="m_duration" placeholder="Duration (e.g. 30 min)"/>
        <input id="m_style" placeholder="Yoga style (e.g. Vinyasa)"/>
        <input id="m_tags" placeholder="Tags (comma separated)"/>
      </div>

      <div class="bar">
        <button class="btn" id="b_save">💾 Save</button>
        <button class="btn ghost" id="b_load">📂 Load Saved…</button>
        <button class="btn ghost" id="b_new">✦ New</button>
        <button class="btn ghost" id="b_section">＋ Section</button>
        <button class="btn ghost" id="b_print">🖨 Print</button>
        <button class="btn ghost" id="b_clear">🧹 Clear</button>
        <span style="flex:1"></span>
        <button class="btn soon" data-soon="Templates">Templates</button>
        <button class="btn soon" data-soon="Community browse">Community</button>
        <button class="btn soon" data-soon="AI generate">AI</button>
        <button class="btn soon" data-soon="Flow / play mode">Flow</button>
        <button class="btn soon" data-soon="Theme">Theme</button>
      </div>
      <label class="share"><input type="checkbox" id="m_share"/> Share with community when saving</label>

      <div id="canvas" class="canvas"></div>
    </div>
  </div>
</div>

<div id="modalRoot"></div>
<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL="https://nxjbpgnpblqepathojzr.supabase.co";
const ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54amJwZ25wYmxxZXBhdGhvanpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTE3MTYsImV4cCI6MjA5MDA2NzcxNn0.0thRMnySyacG_fcFiHlteEk4scwfWrP6HmjSlBdg3Ik";
const sb=supabase.createClient(SUPABASE_URL,ANON);
const $=id=>document.getElementById(id);
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const arr=v=>Array.isArray(v)?v:[];

let SESSION=null, POSES=[], catFilter="", items=[], currentId=null, DRAG=null;

/* AUTH */
async function init(){const{data:{session}}=await sb.auth.getSession();if(session)showApp(session);else $("login").classList.remove("hidden");}
async function showApp(s){SESSION=s;$("login").classList.add("hidden");$("app").classList.remove("hidden");$("whoami").textContent=s.user.email;await loadPoses();renderCanvas();}
$("signin").onclick=async()=>{
  $("loginErr").classList.add("hidden");
  const email=$("email").value.trim(),password=$("password").value;if(!email||!password)return;
  $("signin").disabled=true;$("signin").textContent="Signing in…";
  const{data,error}=await sb.auth.signInWithPassword({email,password});
  $("signin").disabled=false;$("signin").textContent="Sign in";
  if(error){$("loginErr").textContent=error.message;$("loginErr").classList.remove("hidden");return;}
  showApp(data.session);
};
$("password").addEventListener("keydown",e=>{if(e.key==="Enter")$("signin").click();});
$("signout").onclick=async()=>{await sb.auth.signOut();location.reload();};

/* POSES (picker) */
async function loadPoses(){
  const{data,error}=await sb.from("poses").select("id,name,sanskrit_name,emoji,image_url,category,difficulty_level,teaching_cues,short_description").order("canonical_pose_id");
  if(error){$("plist").innerHTML='<div style="color:#A03A22;padding:8px">'+esc(error.message)+'</div>';return;}
  POSES=data||[];
  const cats=[...new Set(POSES.map(p=>p.category).filter(Boolean))].sort();
  $("cats").innerHTML=`<span class="cat ${catFilter===""?"on":""}" data-c="">All</span>`+cats.map(c=>`<span class="cat ${catFilter===c?"on":""}" data-c="${esc(c)}">${esc(c)}</span>`).join("");
  $("cats").querySelectorAll(".cat").forEach(el=>el.onclick=()=>{catFilter=el.dataset.c;loadPoses();renderPicker();});
  renderPicker();
}
function renderPicker(){
  const q=($("psearch").value||"").toLowerCase();
  const list=POSES.filter(p=>(!catFilter||p.category===catFilter)&&(!q||(p.name||"").toLowerCase().includes(q)||(p.sanskrit_name||"").toLowerCase().includes(q)));
  $("plist").innerHTML=list.map(p=>{
    const cue=arr(p.teaching_cues)[0]||p.short_description||"";
    const thumb=p.image_url?`<img src="${esc(p.image_url)}">`:(p.emoji||"🧘");
    const lv=p.difficulty_level?`<span class="lv">${esc(p.difficulty_level.slice(0,3))}</span>`:"";
    return `<div class="pitem" data-id="${p.id}"><div class="pth">${thumb}</div>
      <div style="flex:1;min-width:0"><div class="pn">${esc(p.name)}${lv}</div>
      <div class="ps">${esc(p.sanskrit_name||"")}</div><div class="pc">${esc(cue)}</div></div></div>`;
  }).join("")||'<div style="color:var(--muted);padding:8px">No poses match.</div>';
  $("plist").querySelectorAll(".pitem").forEach(el=>{el.onclick=()=>addPose(el.dataset.id);el.setAttribute("draggable","true");el.ondragstart=e=>{DRAG={kind:"new",id:el.dataset.id};e.dataTransfer.setData("text/plain","new");e.dataTransfer.effectAllowed="copy";};el.ondragend=()=>{DRAG=null;};});
}
$("psearch").addEventListener("input",renderPicker);

/* CANVAS */
function addAt(index,id){const p=POSES.find(x=>String(x.id)===String(id));if(!p)return;items.splice(Math.max(0,Math.min(index,items.length)),0,{kind:"pose",pose:p,notes:"",breaths:5});renderCanvas();}
function addPose(id){addAt(items.length,id);}
$("b_section").onclick=()=>{items.push({kind:"section",title:"New section"});renderCanvas();};
function renderCanvas(){
  const c=$("canvas");
  if(!items.length){c.innerHTML=`<div class="empty"><div class="fl">🌸</div><h4>Begin Your Sequence</h4><div>Click a pose, or drag one from the list, to build your flow</div></div>`;return;}
  let pn=0;
  c.innerHTML=`<div class="seqgrid" id="seqgrid">`+items.map((it,i)=>{
    if(it.kind==="section")
      return `<div class="seqcard section" data-i="${i}"><span class="sc-handle" draggable="true">⠿</span>
        <input value="${esc(it.title)}" oninput="setItem(${i},'title',this.value)"/>
        <button class="sc-rm" onclick="removeItem(${i})">✕</button></div>`;
    pn++;const p=it.pose;const thumb=p.image_url?`<img src="${esc(p.image_url)}">`:(p.emoji||"🧘");
    return `<div class="seqcard" data-i="${i}">
      <div class="sc-top"><span class="sc-handle" draggable="true">⠿</span><span class="sc-num">${pn}</span><button class="sc-rm" onclick="removeItem(${i})">✕</button></div>
      <div class="sc-th">${thumb}</div>
      <div class="sc-name">${esc(p.name)}</div>
      <div class="sc-san">${esc(p.sanskrit_name||"")}</div>
      <div class="sc-cue">${esc(it.notes||"")}</div>
      <div class="sc-br">${it.breaths?esc(it.breaths)+" breaths":"&nbsp;"}</div>
      <button class="sc-edit" onclick="editItem(${i})">Edit</button>
    </div>`;
  }).join("")+`</div>`;
  wireCanvasDnD();
}
function removeItem(i){items.splice(i,1);renderCanvas();}
function handleDrop(target){
  if(!DRAG)return;
  if(DRAG.kind==="new"){addAt(target,DRAG.id);}
  else if(DRAG.kind==="move"){const f=DRAG.from;if(f!==target){const[m]=items.splice(f,1);const t=target>f?target-1:target;items.splice(t,0,m);renderCanvas();}}
  DRAG=null;
}
function wireCanvasDnD(){
  document.querySelectorAll("#seqgrid .seqcard").forEach(card=>{
    const i=+card.dataset.i;const h=card.querySelector(".sc-handle");
    if(h){h.ondragstart=e=>{DRAG={kind:"move",from:i};card.classList.add("drag");e.dataTransfer.setData("text/plain","move");e.dataTransfer.effectAllowed="move";};
          h.ondragend=()=>{card.classList.remove("drag");};}
    card.ondragover=e=>{if(DRAG){e.preventDefault();card.classList.add("over");}};
    card.ondragleave=()=>card.classList.remove("over");
    card.ondrop=e=>{if(!DRAG)return;e.preventDefault();e.stopPropagation();card.classList.remove("over");handleDrop(i);};
  });
}
function editItem(i){
  const it=items[i];if(!it||it.kind!=="pose")return;
  $("modalRoot").innerHTML=`<div class="ovl" id="ovl"><div class="modal" onclick="event.stopPropagation()">
    <h3 class="serif">${esc(it.pose.name)}</h3>
    <div class="field"><label>Cue / note for this pose</label><textarea id="ie_notes" rows="3">${esc(it.notes||"")}</textarea></div>
    <div class="field"><label>Breaths</label><input id="ie_breaths" type="number" min="1" value="${esc(it.breaths||"")}"/></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn ghost" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn" style="flex:1" onclick="saveItem(${i})">Done</button>
    </div></div></div>`;
  $("ovl").onclick=closeModal;
}
function saveItem(i){items[i].notes=$("ie_notes").value;const b=$("ie_breaths").value;items[i].breaths=b?parseInt(b):"";closeModal();renderCanvas();}

/* SAVE / LOAD */
function tagsArr(){return ($("m_tags").value||"").split(",").map(s=>s.trim()).filter(Boolean);}
$("b_save").onclick=async()=>{
  const name=$("m_name").value.trim();
  if(!name)return toast("Give your sequence a name first.");
  if(!items.length)return toast("Add at least one pose.");
  const row={name,level:$("m_level").value.trim()||null,style:$("m_style").value.trim()||null,
    duration_label:$("m_duration").value.trim()||null,description:$("m_description").value.trim()||null,
    playlist_url:$("m_playlist").value.trim()||null,tags:tagsArr(),
    visibility:$("m_share").checked?"community":"private",owner_id:SESSION.user.id};
  if(currentId)row.id=currentId;
  const{data,error}=await sb.from("sequences").upsert(row).select("id").single();
  if(error)return toast("Save failed: "+error.message);
  currentId=data.id;
  await sb.from("sequence_items").delete().eq("sequence_id",currentId);
  const rows=items.map((it,i)=>({sequence_id:currentId,position:i,item_type:it.kind,
    pose_id:it.kind==="pose"?it.pose.id:null,
    custom_name:it.kind==="section"?it.title:it.pose.name,
    custom_sanskrit:it.kind==="pose"?it.pose.sanskrit_name:null,
    notes:it.notes||null,custom_breaths:it.kind==="pose"&&it.breaths?parseInt(it.breaths):null,
    emoji:it.kind==="pose"?it.pose.emoji:null,level:it.kind==="pose"?it.pose.difficulty_level:null}));
  if(rows.length){const r=await sb.from("sequence_items").insert(rows);if(r.error)return toast("Saved sequence, but poses failed: "+r.error.message);}
  toast("Saved ✓");
};
$("b_new").onclick=()=>{if(items.length&&!confirm("Start a new sequence? Unsaved changes will be lost."))return;reset();};
$("b_clear").onclick=()=>{if(items.length&&!confirm("Clear all poses from this sequence?"))return;items=[];renderCanvas();};
function reset(){currentId=null;items=[];["m_name","m_description","m_playlist","m_level","m_duration","m_style","m_tags"].forEach(k=>$(k).value="");$("m_share").checked=false;renderCanvas();}
$("b_print").onclick=()=>window.print();

$("b_load").onclick=async()=>{
  const{data,error}=await sb.from("sequences").select("*").eq("owner_id",SESSION.user.id).order("updated_at",{ascending:false});
  if(error)return toast(error.message);
  const rows=(data||[]).map(s=>`<div class="savedrow" data-id="${s.id}">
    <div style="flex:1"><div style="font-weight:500;color:var(--head)">${esc(s.name)}</div>
    <div style="color:var(--muted);font-size:12px">${esc(s.level||"")} ${esc(s.duration_label||"")} · ${s.visibility}</div></div>
    <span style="color:var(--muted);font-size:11px">${new Date(s.updated_at).toLocaleDateString()}</span></div>`).join("")
    ||'<div style="color:var(--muted)">No saved sequences yet.</div>';
  $("modalRoot").innerHTML=`<div class="ovl" id="ovl"><div class="modal" onclick="event.stopPropagation()">
    <h3 class="serif">Load a sequence</h3>${rows}
    <button class="btn ghost" style="margin-top:14px;width:100%" onclick="closeModal()">Cancel</button></div></div>`;
  $("ovl").onclick=closeModal;
  $("modalRoot").querySelectorAll(".savedrow").forEach(el=>el.onclick=()=>loadSeq(el.dataset.id));
};
function closeModal(){$("modalRoot").innerHTML="";}
async function loadSeq(id){
  const{data:s}=await sb.from("sequences").select("*").eq("id",id).single();
  const{data:its}=await sb.from("sequence_items").select("*").eq("sequence_id",id).order("position");
  currentId=id;
  $("m_name").value=s.name||"";$("m_description").value=s.description||"";$("m_playlist").value=s.playlist_url||"";
  $("m_level").value=s.level||"";$("m_duration").value=s.duration_label||"";$("m_style").value=s.style||"";
  $("m_tags").value=arr(s.tags).join(", ");$("m_share").checked=s.visibility==="community";
  items=(its||[]).map(it=>{
    if(it.item_type==="section")return{kind:"section",title:it.custom_name||"Section"};
    const p=POSES.find(x=>String(x.id)===String(it.pose_id))||{id:it.pose_id,name:it.custom_name,sanskrit_name:it.custom_sanskrit,emoji:it.emoji};
    return{kind:"pose",pose:p,notes:it.notes||"",breaths:it.custom_breaths||""};
  });
  closeModal();renderCanvas();toast("Loaded “"+(s.name||"")+"”");
}

/* misc */
document.querySelectorAll(".btn.soon").forEach(b=>b.onclick=()=>toast(b.dataset.soon+" — coming in the next update."));
let tt;function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),2400);}
window.setItem=(i,f,v)=>{items[i][f]=v;};window.removeItem=removeItem;window.closeModal=closeModal;window.editItem=editItem;window.saveItem=saveItem;
$("canvas").addEventListener("dragover",e=>{if(DRAG)e.preventDefault();});
$("canvas").addEventListener("drop",e=>{if(!DRAG)return;e.preventDefault();handleDrop(items.length);});
sb.auth.onAuthStateChange((_e,s)=>{if(!s){$("app").classList.add("hidden");$("login").classList.remove("hidden");}});
init();
</script>
</body>
</html>
