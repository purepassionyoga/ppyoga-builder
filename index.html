<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sequence Builder · Pure Passion Yoga</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg:#F5F1F4; --card:#fff; --ink:#2C2238; --head:#3A2E48; --aub:#4A3A5A;
    --rose:#C8A0A6; --clayDk:#A87C83; --sage:#a8ad91; --jade:#2E7D6B; --amber:#B98A1F;
    --muted:#8A8090; --line:#ECE5EC; --lineDk:#DDD2DD; --field:#FBF9FB;
    --font-head:'Playfair Display',Georgia,serif; --font-body:'Poppins',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);font-size:14px;-webkit-font-smoothing:antialiased}
  .serif{font-family:var(--font-head)}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  .hidden{display:none!important}
  .btn{background:var(--clayDk);color:#fff;border:none;padding:8px 14px;border-radius:9px;font-weight:500;font-size:13px}
  .btn:hover{background:#925266}
  .btn.ghost{background:#fff;color:var(--aub);border:1px solid var(--lineDk)}
  .btn.ghost:hover{border-color:var(--rose)}
  .btn.soon{background:#F2ECF2;color:#B3A8B8;border:1px solid var(--line)}
  .btn:disabled{opacity:.5}

  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .lcard{background:#fff;border:1px solid var(--line);border-radius:22px;padding:38px 34px;width:100%;max-width:380px;box-shadow:0 18px 50px rgba(74,58,90,.08)}
  .lcard h1{font-family:var(--font-head);color:var(--clayDk);font-size:26px;margin:0 0 4px;text-align:center}
  .lcard p{color:var(--muted);text-align:center;margin:0 0 24px;font-size:13px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--lineDk);border-radius:9px;background:var(--field);color:var(--ink);outline:none}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--rose)}
  .err{background:#FBE6DF;color:#A03A22;border-radius:9px;padding:9px 12px;font-size:13px;margin-bottom:12px}

  .top{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .topin{max-width:1320px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:14px}
  .brand{font-family:var(--font-head);font-weight:700;color:var(--clayDk);font-size:18px}
  .tag-admin{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 8px}
  .who{margin-left:auto;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:12px}

  .layout{max-width:1320px;margin:0 auto;padding:16px 20px 60px;display:grid;grid-template-columns:300px 1fr;gap:18px;align-items:start}
  @media (max-width:860px){.layout{grid-template-columns:1fr}}

  /* picker */
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;position:sticky;top:74px;max-height:calc(100vh - 92px);display:flex;flex-direction:column}
  .panel h3{font-family:var(--font-head);color:var(--head);margin:0 0 10px;font-size:16px}
  .psearch{width:100%;padding:8px 11px;border:1px solid var(--lineDk);border-radius:9px;background:var(--field);outline:none;margin-bottom:8px}
  .cats{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
  .cat{font-size:11px;padding:3px 9px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted)}
  .cat.on{background:var(--rose);color:#fff;border-color:var(--rose)}
  .plist{overflow:auto;flex:1;margin:0 -6px;padding:0 6px}
  .pitem{display:flex;gap:10px;align-items:flex-start;padding:8px;border-radius:10px;cursor:pointer}
  .pitem:hover{background:#FBF7FA}
  .pth{width:34px;height:34px;border-radius:8px;background:#F4EEF3;display:flex;align-items:center;justify-content:center;font-size:17px;overflow:hidden;flex:0 0 auto}
  .pth img{max-width:100%;max-height:100%;object-fit:contain}
  .pn{font-weight:500;color:var(--head);font-size:13px;line-height:1.2}
  .ps{color:var(--sage);font-style:italic;font-size:11px}
  .pc{color:var(--muted);font-size:11px;margin-top:1px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .lv{font-size:10px;color:var(--amber);float:right}

  /* builder */
  .build{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px}
  .titlein{font-family:var(--font-head);font-size:24px;color:var(--clayDk);border:none;outline:none;width:100%;background:none;margin-bottom:4px}
  .meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
  .meta .full{grid-column:1/-1}
  .meta input,.meta select,.meta textarea{width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:9px;background:var(--field);outline:none}
  .bar{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin:12px 0;padding:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .share{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:13px;margin:8px 0}

  .canvas{margin-top:14px;min-height:160px}
  .empty{border:2px dashed var(--lineDk);border-radius:14px;padding:48px 20px;text-align:center;color:var(--muted)}
  .empty .fl{font-size:30px}
  .empty h4{font-family:var(--font-head);font-style:italic;color:var(--rose);font-size:22px;margin:8px 0 4px;font-weight:500}
  .item{display:flex;gap:12px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:9px}
  .item.drag{opacity:.4}
  .item.over{border-color:var(--rose);box-shadow:0 0 0 2px rgba(194,132,143,.2)}
  .handle{cursor:grab;color:var(--lineDk);font-size:18px;padding-top:4px;user-select:none}
  .ith{width:42px;height:42px;border-radius:9px;background:#F4EEF3;display:flex;align-items:center;justify-content:center;font-size:21px;overflow:hidden;flex:0 0 auto}
  .ith img{max-width:100%;max-height:100%;object-fit:contain}
  .ibody{flex:1;min-width:0}
  .iname{font-weight:500;color:var(--head)}
  .isan{color:var(--sage);font-style:italic;font-size:12px}
  .iopts{display:flex;gap:8px;align-items:center;margin-top:7px}
  .iopts input.notes{flex:1;padding:6px 9px;border:1px solid var(--line);border-radius:8px;background:var(--field);outline:none;font-size:13px}
  .iopts input.br{width:78px;padding:6px 9px;border:1px solid var(--line);border-radius:8px;background:var(--field);outline:none;font-size:13px}
  .rm{background:none;border:none;color:var(--clayDk);font-size:16px;padding:2px 6px}
  .section{background:#F6EFF4;border:1px dashed var(--rose);border-radius:12px;padding:9px 12px;margin-bottom:9px;display:flex;gap:10px;align-items:center}
  .section input{flex:1;border:none;background:none;outline:none;font-family:var(--font-head);font-style:italic;color:var(--clayDk);font-size:17px}
  .pos{color:var(--muted);font-size:11px;width:20px;text-align:right;padding-top:3px}
  .seqgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px}
  .seqcard{background:#fff;border:1px solid var(--line);border-radius:13px;padding:9px 9px 10px;display:flex;flex-direction:column;text-align:center;position:relative}
  .seqcard.over{border-color:var(--rose);box-shadow:0 0 0 2px rgba(194,132,143,.25)}
  .seqcard.drag{opacity:.4}
  .seqcard.section{grid-column:1/-1;flex-direction:row;align-items:center;gap:10px;text-align:left;background:#F6EFF4;border-style:dashed;border-color:var(--rose)}
  .seqcard.section input{flex:1;border:none;background:none;outline:none;font-family:var(--font-head);font-style:italic;color:var(--clayDk);font-size:16px}
  .sc-top{display:flex;align-items:center;justify-content:space-between}
  .sc-num{font-size:12px;color:var(--muted);font-weight:600}
  .sc-handle{cursor:grab;color:var(--lineDk);font-size:14px;user-select:none}
  .sc-rm{background:none;border:none;color:var(--clayDk);font-size:14px;cursor:pointer;line-height:1}
  .sc-th{height:72px;display:flex;align-items:center;justify-content:center;font-size:38px;margin:3px 0}
  .sc-th img{max-height:100%;max-width:100%;object-fit:contain}
  .sc-name{font-family:var(--font-head);color:var(--rose);font-size:14px;line-height:1.15}
  .sc-san{color:var(--sage);font-style:italic;font-size:11px;margin-top:1px}
  .sc-cue{color:var(--muted);font-size:11px;margin:5px 0 4px;min-height:28px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .sc-br{color:var(--amber);font-size:11px;font-weight:600;min-height:15px}
  .sc-edit{margin-top:6px;background:#F6EFF4;color:var(--clayDk);border:none;border-radius:8px;padding:5px 0;font-size:12px;cursor:pointer}
  .sc-edit:hover{background:#EFE2EC}

  .flow{position:fixed;inset:0;background:linear-gradient(165deg,#fff,#F6EFF4);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
  .flow-exit{position:absolute;top:16px;right:20px;background:none;border:none;font-size:24px;color:var(--muted);cursor:pointer;line-height:1}
  .flow-prog{position:absolute;top:20px;left:24px;color:var(--muted);font-size:13px}
  .flow-th{height:200px;display:flex;align-items:center;justify-content:center;font-size:96px;margin-bottom:6px}
  .flow-th img{max-height:200px;max-width:60vw;object-fit:contain}
  .flow-k{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--clayDk)}
  .flow-name{font-family:var(--font-head);color:var(--rose);font-size:44px;line-height:1.05}
  .flow-san{font-family:var(--font-head);font-style:italic;color:var(--sage);font-size:22px;margin-top:4px}
  .flow-cue{color:var(--ink);font-size:16px;max-width:560px;margin:14px auto 0;line-height:1.5}
  .flow-count{font-family:var(--font-head);color:var(--clayDk);font-size:54px;margin-top:14px}
  .flow-sub{color:var(--muted);font-size:13px;margin-top:2px}
  .flow-ctrls{display:flex;gap:10px;align-items:center;margin-top:24px}
  .flow-ctrls button{background:#fff;border:1px solid var(--lineDk);color:var(--aub);border-radius:10px;padding:9px 16px;font-size:14px;cursor:pointer}
  .flow-ctrls button.primary{background:var(--clayDk);color:#fff;border-color:var(--clayDk)}
  .flow-toggles{position:absolute;bottom:20px;display:flex;gap:18px;color:var(--muted);font-size:13px}
  .flow-toggles label{display:flex;align-items:center;gap:6px;cursor:pointer}
  .printhead{display:none}
  @media print{
    .printhead{display:block;text-align:center;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid #C8A0A6}
    .printhead h1{font-family:var(--font-head);color:#A87C83;margin:0 0 4px;font-size:26px}
    .printhead .meta{color:#888;font-size:13px}
    body.theme-minimal .printhead{border-bottom:1px solid #ccc}
    body.theme-minimal .printhead h1{font-family:var(--font-body);color:#222;font-size:22px}
    body.theme-botanical .printhead{border-bottom:2px solid #a8ad91}
    body.theme-botanical .printhead h1{color:#7E8466}
  }
  .printfoot{display:none}
  @media print{.printfoot{display:block;text-align:center;color:#999;margin-top:22px;font-size:12px}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--head);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:80;opacity:0;transition:.25s}
  .toast.show{opacity:1}
  .ovl{position:fixed;inset:0;background:rgba(44,34,56,.4);z-index:60;display:flex;align-items:center;justify-content:center;padding:18px}
  .modal{background:#fff;border-radius:18px;width:100%;max-width:440px;max-height:80vh;overflow:auto;padding:20px}
  .modal h3{font-family:var(--font-head);color:var(--head);margin:0 0 12px}
  .savedrow{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer}
  .savedrow:hover{background:#FBF7FA}

  @media print{
    body{background:#fff}
    .top,.panel,.bar,.share,.handle,.rm,.sc-handle,.sc-rm,.sc-edit,#picker{display:none!important}
    .layout{display:block;padding:0}
    .build{border:none;padding:0}
    .item,.section{break-inside:avoid}
  }

  /* ===== PPY site header ===== */
.ppy-header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--ppy-line,#EFE6E8)}
.ppy-header [hidden]{display:none !important}
.ppy-bar{max-width:1200px;margin:0 auto;padding:11px 22px;display:flex;align-items:center;gap:16px}
.ppy-brand{display:flex;align-items:center;gap:9px;text-decoration:none;flex:0 0 auto}
.ppy-brand .mark{width:34px;height:34px;flex:0 0 auto}
.ppy-brand .wm{font-family:var(--ppy-fhead,'Playfair Display',Georgia,serif);font-weight:700;color:var(--ppy-accentDk,#A87C83);font-size:20px;line-height:1}
.ppy-brand img.lg{height:42px;width:auto;display:block}
.ppy-nav{display:flex;align-items:center;gap:2px;margin-left:6px}
.ppy-nav a{display:inline-flex;align-items:center;color:var(--ppy-ink,#6C7682);text-decoration:none;font-size:14px;font-weight:500;font-family:var(--ppy-fbody,'Poppins',system-ui,sans-serif);padding:8px 12px;border-radius:10px;white-space:nowrap}
.ppy-nav a:hover{background:var(--ppy-chip,#F6ECEF);color:var(--ppy-accentDk,#A87C83)}
.ppy-nav a.active{color:var(--ppy-accent,#C8A0A6);font-weight:600}
.ppy-nav a.locked{color:#A79FAC}
.ppy-nav a .lk{margin-left:5px;opacity:.7}
.ppy-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.ppy-tier{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ppy-accentDk,#A87C83);background:var(--ppy-chip,#F6ECEF);border-radius:999px;padding:4px 9px;font-weight:600;font-family:var(--ppy-fbody,'Poppins',sans-serif)}
.ppy-btn{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-weight:500;font-size:13.5px;font-family:var(--ppy-fbody,'Poppins',sans-serif);padding:8px 15px;border-radius:11px;white-space:nowrap;cursor:pointer;border:none}
.ppy-btn.primary{background:var(--ppy-accentDk,#A87C83);color:#fff}
.ppy-btn.ghost{background:#fff;color:var(--ppy-accentDk,#A87C83);border:1px solid var(--ppy-lineDk,#E2D7D9)}
.ppy-btn.up{background:var(--ppy-accent,#C8A0A6);color:#fff}
.ppy-btn.admin{background:#fff;color:var(--ppy-accentDk,#A87C83);border:1px solid var(--ppy-accent,#C8A0A6)}
.ppy-burger{display:none;background:none;border:1px solid var(--ppy-lineDk,#E2D7D9);border-radius:10px;width:42px;height:38px;cursor:pointer;align-items:center;justify-content:center;color:var(--ppy-ink,#6C7682)}
.ppy-burger svg{width:22px;height:22px}
.ppy-mobile{display:none;border-top:1px solid var(--ppy-line,#EFE6E8);background:#fff}
.ppy-mobile a{display:flex;align-items:center;padding:13px 22px;color:var(--ppy-ink,#6C7682);text-decoration:none;font-weight:500;font-family:var(--ppy-fbody,'Poppins',sans-serif);border-bottom:1px solid var(--ppy-line,#EFE6E8)}
.ppy-mobile a .lk{margin-left:auto;opacity:.6}
.ppy-mobile a.up{color:#fff;background:var(--ppy-accent,#C8A0A6)}
.ppy-mobile a.admin{color:var(--ppy-accentDk,#A87C83)}
@media (max-width:820px){.ppy-nav{display:none}.ppy-right .hide-sm{display:none}.ppy-burger{display:inline-flex}.ppy-mobile.open{display:block}}
/* ===== end header ===== */
.ppy-header{position:static}
</style>
</head>
<body>
<header class="ppy-header" id="ppyHeader">
  <div class="ppy-bar">
    <a class="ppy-brand" id="ppyBrand" href="/">
      <svg class="mark" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 7c2.6 3.2 4 6.7 4 10.2 0 3.8-1.6 7.2-4 9.8-2.4-2.6-4-6-4-9.8C20 13.7 21.4 10.2 24 7Z" fill="#C8A0A6"/>
        <path d="M13 14c3.7 1 6.6 2.9 8.6 5.3 2.2 2.6 3.2 5.8 3.1 9-3.4-.6-6.6-2.2-8.8-4.8-2-2.4-3-5.6-2.9-9.5Z" fill="#a8ad91"/>
        <path d="M35 14c-3.7 1-6.6 2.9-8.6 5.3-2.2 2.6-3.2 5.8-3.1 9 3.4-.6 6.6-2.2 8.8-4.8 2-2.4 3-5.6 2.9-9.5Z" fill="#a8ad91"/>
        <path d="M8 22c3.6-.2 6.8.6 9.4 2.3 2.7 1.8 4.5 4.4 5.4 7.4-3.4.5-6.8-.1-9.6-1.9C10.7 28.2 9 25.4 8 22Z" fill="#A87C83"/>
        <path d="M40 22c-3.6-.2-6.8.6-9.4 2.3-2.7 1.8-4.5 4.4-5.4 7.4 3.4.5 6.8-.1 9.6-1.9 2.5-1.6 4.2-4.4 5.2-7.8Z" fill="#A87C83"/>
        <path d="M12 31c4 0 12 1.6 12 8 0-6.4 8-8 12-8-1.5 5-6.5 9-12 9s-10.5-4-12-9Z" fill="#C8A0A6"/>
      </svg>
      <span class="wm brand">Pure Passion Yoga</span>
    </a>
    <nav class="ppy-nav" id="ppyNav">
      <a href="/library">Pose Library</a>
      <a href="/builder">Sequence Builder</a>
      <a data-nav="classes" hidden href="/classes">Classes</a>
      <a data-nav="challenges" hidden href="/challenges">Challenges</a>
      <a href="https://purepassionyoga.com/shop">Shop</a>
      <a href="https://purepassionyoga.com/about">About</a>
    </nav>
    <div class="ppy-right" id="ppyRight">
      <span class="ppy-tier" id="ppyTier" hidden></span>
      <a class="ppy-btn admin" id="ppyAdmin" hidden href="/admin">Admin</a>
      <a class="ppy-btn primary" id="ppyAuth" href="/profile">Sign in</a>
      <a class="ppy-btn ghost" id="ppySignout" hidden href="#">Sign out</a>
    </div>
    <button class="ppy-burger" id="ppyBurger" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
  <div class="ppy-mobile" id="ppyMobile">
    <a href="/library">Pose Library</a>
    <a href="/builder">Sequence Builder</a>
    <a data-nav="classes" hidden href="/classes">Classes</a>
    <a data-nav="challenges" hidden href="/challenges">Challenges</a>
    <a href="https://purepassionyoga.com/shop">Shop</a>
    <a href="https://purepassionyoga.com/about">About</a>
    <a class="admin" id="ppyAdminM" hidden href="/admin">Admin</a>
    <a class="up" id="ppyAuthM" href="/profile">Sign in</a>
    <a class="admin" id="ppySignoutM" hidden href="#">Sign out</a>
  </div>
</header>

<div id="login">
  <div class="lcard">
    <h1 class="serif">Pure Passion Yoga</h1>
    <p>Sequence Builder — teacher sign-in</p>
    <div id="loginErr" class="err hidden"></div>
    <div class="field"><label>Email</label><input id="email" type="email" autocomplete="username"/></div>
    <div class="field"><label>Password</label><input id="password" type="password" autocomplete="current-password"/></div>
    <button id="signin" class="btn" style="width:100%;margin-top:6px">Sign in</button>
  </div>
</div>

<div id="app" class="hidden">
  <div class="top" style="display:none"><div class="topin">
    <span class="brand">Pure Passion Yoga</span><span class="tag-admin">Sequence Builder</span>
    <span class="who"><span id="whoami"></span><button id="signout" class="btn ghost" style="padding:6px 12px">Sign out</button></span>
  </div></div>

  <div class="layout">
    <!-- PICKER -->
    <div class="panel" id="picker">
      <h3>Poses</h3>
      <input id="psearch" class="psearch" placeholder="Search poses…"/>
      <div id="cats" class="cats"></div>
      <div id="plist" class="plist"></div>
    </div>

    <!-- BUILDER -->
    <div class="build">
      <input id="m_name" class="titlein" placeholder="My Yoga Sequence"/>
      <div class="meta">
        <textarea id="m_description" class="full" rows="2" placeholder="Sequence description, intention, or theme… (optional)"></textarea>
        <input id="m_playlist" class="full" placeholder="🎵 Playlist link — Spotify, YouTube, Apple Music… (optional)"/>

function handleDrop(target){

}
function wireCanvasDnD(){

    card.ondragleave=()=>card.classList.remove("over");

}

  $("ovl").onclick=closeModal;
  $("modalRoot").querySelectorAll(".savedrow").forEach(el=>el.onclick=()=>loadSeq(el.dataset.id));

function closeModal(){$("modalRoot").innerHTML="";}
async function loadSeq(id){
  const{data:s}=await sb.from("sequences").select("*").eq("id",id).single();
  const{data:its}=await sb.from("sequence_items").select("*").eq("sequence_id",id).order("position");
  currentId=id;
  $("m_name").value=s.name||"";$("m_description").value=s.description||"";$("m_playlist").value=s.playlist_url||"";
  $("m_level").value=s.level||"";$("m_duration").value=s.duration_label||"";$("m_style").value=s.style||"";
  $("m_tags").value=arr(s.tags).join(", ");$("m_share").checked=s.visibility==="community";applyTheme(s.theme||"classic");
  items=(its||[]).map(it=>{

    const p=POSES.find(x=>String(x.id)===String(it.pose_id))||{id:it.pose_id,name:it.custom_name,sanskrit_name:it.custom_sanskrit,emoji:it.emoji};

/* misc */
document.querySelectorAll(".btn.soon").forEach(b=>b.onclick=()=>toast(b.dataset.soon+" — coming in the next update."));
let tt;function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),2400);}
window.setItem=(i,f,v)=>{items[i][f]=v;};window.removeItem=removeItem;window.closeModal=closeModal;window.editItem=editItem;window.saveItem=saveItem;

function darken(hex,f){const m=hex.replace('#','');const n=m.length===3?m.split('').map(c=>c+c).join(''):m;const r=Math.round(parseInt(n.slice(0,2),16)*f),g=Math.round(parseInt(n.slice(2,4),16)*f),b=Math.round(parseInt(n.slice(4,6),16)*f);return '#'+[r,g,b].map(x=>Math.min(255,x).toString(16).padStart(2,'0')).join('');}
function applyDesign(d){
  if(!d)return;const r=document.documentElement.style;
  if(d.color_primary){const pr=d.color_primary,dk=darken(pr,0.82);r.setProperty('--rose',pr);r.setProperty('--head',pr);r.setProperty('--clayDk',dk);r.setProperty('--aub',dk);}
  if(d.color_secondary)r.setProperty('--sage',d.color_secondary);
  if(d.color_page_bg)r.setProperty('--bg',d.color_page_bg);
  if(d.color_surface){r.setProperty('--card',d.color_surface);r.setProperty('--field',d.color_surface);}
  if(d.color_body_text)r.setProperty('--ink',d.color_body_text);
  if(d.color_secondary_text)r.setProperty('--muted',d.color_secondary_text);
  const head=d.font_heading||'Playfair Display',body=d.font_body||'Poppins';
  r.setProperty('--font-head',"'"+head+"',Georgia,serif");r.setProperty('--font-body',"'"+body+"',system-ui,sans-serif");
  const fam=n=>n.trim().replace(/\s+/g,'+');const l=document.createElement('link');l.rel='stylesheet';
  l.href='https://fonts.googleapis.com/css2?family='+fam(head)+':ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family='+fam(body)+':wght@300;400;500;600&display=swap';document.head.appendChild(l);
  if(d.app_name){document.querySelectorAll('.brand').forEach(e=>e.textContent=d.app_name);document.title=d.app_name+' \u00b7 Sequence Builder';}
}

let BSET={};
async function loadBuilderSettings(){try{const{data}=await sb.from("app_settings").select("value").eq("key","builder").single();BSET=(data&&data.value)||{};applyBuilderDefaults();}catch(e){}}
function applyBuilderDefaults(){

  if(!$("m_level").value&&BSET.default_level)$("m_level").value=BSET.default_level;

let flowIdx=0,flowRemain=0,flowTimer=null,flowPaused=false,flowChime=false,flowVoice=false,flowBreathSec=5;
function startFlow(){
  if(!items.length)return toast("Add poses to your flow first.");
  flowBreathSec=parseInt(BSET.flow_breath)||5;flowChime=!!BSET.flow_chime;flowVoice=!!BSET.flow_voice;flowIdx=0;flowPaused=false;
  document.getElementById("flowRoot").innerHTML=`<div class="flow"><div class="flow-prog" id="flowProg"></div>
    <button class="flow-exit" onclick="endFlow()">✕</button><div id="flowMain"></div>
    <div class="flow-ctrls"><button onclick="flowPrev()">◀ Prev</button>
      <button class="primary" id="flowPause" onclick="flowToggle()">Pause</button>
      <button onclick="flowNext()">Next ▶</button></div>
    <div class="flow-toggles"><label><input type="checkbox" id="flowChimeT" ${flowChime?"checked":""}> Chime</label>
      <label><input type="checkbox" id="flowVoiceT" ${flowVoice?"checked":""}> Voice</label></div></div>`;
  document.body.style.overflow="hidden";
  document.getElementById("flowChimeT").onchange=e=>{flowChime=e.target.checked;};
  document.getElementById("flowVoiceT").onchange=e=>{flowVoice=e.target.checked;if(!flowVoice&&window.speechSynthesis)speechSynthesis.cancel();};
  flowStep();
}
function flowStep(){
  clearInterval(flowTimer);
  if(flowIdx>=items.length){flowDone();return;}
  const it=items[flowIdx];document.getElementById("flowProg").textContent=(flowIdx+1)+" / "+items.length;
  if(it.kind==="section"){
    document.getElementById("flowMain").innerHTML=`<div class="flow-k">Section</div><div class="flow-name">${esc(it.title)}</div><div class="flow-count" id="flowCount"></div>`;
    speakFlow(it.title);flowRemain=4;tickStart();return;
  }
  const pp=it.pose,thumb=pp.image_url?`<img src="${esc(pp.image_url)}">`:(pp.emoji||"🧘"),breaths=parseInt(it.breaths)||5;
  flowRemain=breaths*flowBreathSec;
  document.getElementById("flowMain").innerHTML=`<div class="flow-th">${thumb}</div>
    <div class="flow-name">${esc(pp.name)}</div><div class="flow-san">${esc(pp.sanskrit_name||"")}</div>
    ${it.notes?`<div class="flow-cue">${esc(it.notes)}</div>`:""}
    <div class="flow-count" id="flowCount"></div><div class="flow-sub">${breaths} breaths</div>`;
  speakFlow(pp.name+(pp.sanskrit_name?", "+pp.sanskrit_name:""));tickStart();
}
function tickStart(){updateFlowCount();flowTimer=setInterval(()=>{if(flowPaused)return;flowRemain--;if(flowRemain<=0){clearInterval(flowTimer);if(flowChime)chimeFlow();flowIdx++;flowStep();return;}updateFlowCount();},1000);}
function updateFlowCount(){const c=document.getElementById("flowCount");if(c)c.textContent=flowRemain;}
function flowToggle(){flowPaused=!flowPaused;const b=document.getElementById("flowPause");if(b)b.textContent=flowPaused?"Resume":"Pause";}
function flowNext(){clearInterval(flowTimer);flowIdx++;flowStep();}
function flowPrev(){clearInterval(flowTimer);flowIdx=Math.max(0,flowIdx-1);flowStep();}
function flowDone(){clearInterval(flowTimer);document.getElementById("flowMain").innerHTML=`<div class="flow-th">🌸</div><div class="flow-name">Complete</div><div class="flow-sub">Beautiful practice.</div>`;const c=document.querySelector(".flow-ctrls");if(c)c.style.display="none";}
function endFlow(){clearInterval(flowTimer);if(window.speechSynthesis)speechSynthesis.cancel();document.getElementById("flowRoot").innerHTML="";document.body.style.overflow="";}
function speakFlow(t){try{if(flowVoice&&"speechSynthesis"in window){const u=new SpeechSynthesisUtterance(t);u.rate=0.9;speechSynthesis.cancel();speechSynthesis.speak(u);}}catch(e){}}
function chimeFlow(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type="sine";o.frequency.value=528;g.gain.setValueAtTime(0.0001,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.25,ctx.currentTime+0.05);g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+1.1);o.start();o.stop(ctx.currentTime+1.15);}catch(e){}}
$("b_flow").onclick=startFlow;
window.endFlow=endFlow;window.flowPrev=flowPrev;window.flowNext=flowNext;window.flowToggle=flowToggle;

      <button class="btn" style="flex:1" id="ai_go">Generate</button></div>
    <div id="ai_status" style="color:var(--muted);font-size:13px;margin-top:8px"></div></div></div>`;

async function runAI(){
  $("ai_err").classList.add("hidden");
  $("ai_go").disabled=true;$("ai_go").textContent="Generating\u2026";$("ai_status").textContent="Designing your sequence\u2026 this can take a few seconds.";
  try{
    const{data:{session}}=await sb.auth.getSession();
    const res=await fetch(FN_URL,{method:"POST",headers:{"Content-Type":"application/json","apikey":ANON,"Authorization":"Bearer "+(session&&session.access_token)},
      body:JSON.stringify({prompt:$("ai_prompt").value.trim(),level:$("ai_level").value.trim(),duration:$("ai_duration").value.trim(),poses:POSES.map(p=>p.name)})});
    const out=await res.json();
    if(!res.ok||out.error)throw new Error(out.error||("Request failed ("+res.status+")"));
    const built=[];let missed=0;
    (out.items||[]).forEach(it=>{const p=POSES.find(x=>(x.name||"").toLowerCase()===String(it.pose||"").toLowerCase());
      if(p)built.push({kind:"pose",pose:p,notes:it.cue||"",breaths:parseInt(it.breaths)||5});else missed++;});
    if(!built.length)throw new Error("No matching poses came back \u2014 try rephrasing.");
    items=built;if(out.title&&!$("m_name").value.trim())$("m_name").value=out.title;
    if($("ai_level").value)$("m_level").value=$("ai_level").value;if($("ai_duration").value)$("m_duration").value=$("ai_duration").value;
    closeModal();renderCanvas();toast("Generated "+built.length+" poses"+(missed?" ("+missed+" skipped)":"")+" \u2713");
  }catch(e){const el=$("ai_err");el.textContent=e.message;el.classList.remove("hidden");$("ai_status").textContent="";}
  $("ai_go").disabled=false;$("ai_go").textContent="Generate";
}

async function openCommunity(){
  $("modalRoot").innerHTML=`<div class="ovl" id="ovl"><div class="modal" onclick="event.stopPropagation()">
    <h3 class="serif">Community sequences</h3><div id="comList" style="color:var(--muted)">Loading\u2026</div>
    <button class="btn ghost" style="margin-top:14px;width:100%" onclick="closeModal()">Close</button></div></div>`;
  $("ovl").onclick=closeModal;
  let r=await sb.from("sequences").select("*, owner:profiles(display_name)").eq("visibility","community").order("likes_count",{ascending:false}).limit(50);
  if(r.error)r=await sb.from("sequences").select("*").eq("visibility","community").order("likes_count",{ascending:false}).limit(50);
  const rows=(r.data||[]).map(s=>`<div class="savedrow" data-id="${s.id}">
    <div style="flex:1"><div style="font-weight:500;color:var(--head)">${esc(s.name)}</div>
    <div style="color:var(--muted);font-size:12px">${esc((s.owner&&s.owner.display_name)||"PPY teacher")} \u00b7 ${esc(s.level||"")} ${esc(s.duration_label||"")}</div></div>
    <span style="color:var(--muted);font-size:11px">\u2665 ${s.likes_count||0}</span></div>`).join("")||'<div style="color:var(--muted)">No community sequences yet.</div>';
  $("comList").innerHTML=rows;
  $("comList").querySelectorAll(".savedrow").forEach(el=>el.onclick=()=>loadCommunity(el.dataset.id));
}
async function loadCommunity(id){
  const{data:s}=await sb.from("sequences").select("*").eq("id",id).single();
  const{data:its}=await sb.from("sequence_items").select("*").eq("sequence_id",id).order("position");
  currentId=null;
  $("m_name").value=(s.name||"")+" (copy)";$("m_description").value=s.description||"";$("m_playlist").value=s.playlist_url||"";
  $("m_level").value=s.level||"";$("m_duration").value=s.duration_label||"";$("m_style").value=s.style||"";
  $("m_tags").value=arr(s.tags).join(", ");$("m_share").checked=false;
  items=(its||[]).map(it=>{if(it.item_type==="section")return{kind:"section",title:it.custom_name||"Section"};
    const p=POSES.find(x=>String(x.id)===String(it.pose_id))||{id:it.pose_id,name:it.custom_name,sanskrit_name:it.custom_sanskrit,emoji:it.emoji};
    return{kind:"pose",pose:p,notes:it.notes||"",breaths:it.custom_breaths||""};});
  closeModal();renderCanvas();toast("Loaded a copy \u2014 tweak and Save to make it yours");
}
window.openAI=openAI;window.runAI=runAI;window.openCommunity=openCommunity;window.loadCommunity=loadCommunity;

$("b_templates").onclick=openTemplates;
async function openTemplates(){
  $("modalRoot").innerHTML=`<div class="ovl" id="ovl"><div class="modal" onclick="event.stopPropagation()">
    <h3 class="serif">Templates</h3>
    <button class="btn" id="tpl_save" style="width:100%;margin-bottom:12px">+ Save current sequence as template</button>
    <div id="tplList" style="color:var(--muted)">Loading\u2026</div>
    <button class="btn ghost" style="margin-top:14px;width:100%" onclick="closeModal()">Close</button></div></div>`;
  $("ovl").onclick=closeModal;$("tpl_save").onclick=saveAsTemplate;
  const{data}=await sb.from("sequences").select("*").eq("owner_id",SESSION.user.id).eq("is_template",true).order("updated_at",{ascending:false});
  $("tplList").innerHTML=(data||[]).map(s=>`<div class="savedrow" data-id="${s.id}"><div style="flex:1"><div style="font-weight:500;color:var(--head)">${esc(s.name)}</div><div style="color:var(--muted);font-size:12px">${esc(s.level||"")} ${esc(s.duration_label||"")}</div></div></div>`).join("")||'<div style="color:var(--muted)">No templates yet. Build a sequence, then save it as a template.</div>';
  $("tplList").querySelectorAll(".savedrow").forEach(el=>el.onclick=()=>loadTemplate(el.dataset.id));
}
async function saveAsTemplate(){
  if(!items.length)return toast("Add poses first.");
  const row={name:($("m_name").value.trim()||"Untitled")+" (template)",level:$("m_level").value.trim()||null,style:$("m_style").value.trim()||null,
    duration_label:$("m_duration").value.trim()||null,description:$("m_description").value.trim()||null,playlist_url:$("m_playlist").value.trim()||null,
    tags:tagsArr(),visibility:"private",is_template:true,theme:seqTheme,owner_id:SESSION.user.id};
  const{data,error}=await sb.from("sequences").insert(row).select("id").single();
  if(error)return toast("Failed: "+error.message);
  const rows=items.map((it,i)=>({sequence_id:data.id,position:i,item_type:it.kind,pose_id:it.kind==="pose"?it.pose.id:null,
    custom_name:it.kind==="section"?it.title:it.pose.name,custom_sanskrit:it.kind==="pose"?it.pose.sanskrit_name:null,
    notes:it.notes||null,custom_breaths:it.kind==="pose"&&it.breaths?parseInt(it.breaths):null,
    emoji:it.kind==="pose"?it.pose.emoji:null,level:it.kind==="pose"?it.pose.difficulty_level:null}));
  if(rows.length)await sb.from("sequence_items").insert(rows);
  toast("Saved as template \u2713");openTemplates();
}
async function loadTemplate(id){
  const{data:s}=await sb.from("sequences").select("*").eq("id",id).single();
  const{data:its}=await sb.from("sequence_items").select("*").eq("sequence_id",id).order("position");
  currentId=null;
  $("m_name").value=(s.name||"").replace(/ \(template\)$/,"");$("m_description").value=s.description||"";$("m_playlist").value=s.playlist_url||"";
  $("m_level").value=s.level||"";$("m_duration").value=s.duration_label||"";$("m_style").value=s.style||"";$("m_tags").value=arr(s.tags).join(", ");$("m_share").checked=false;applyTheme(s.theme||"classic");
  items=(its||[]).map(it=>{if(it.item_type==="section")return{kind:"section",title:it.custom_name||"Section"};
    const p=POSES.find(x=>String(x.id)===String(it.pose_id))||{id:it.pose_id,name:it.custom_name,sanskrit_name:it.custom_sanskrit,emoji:it.emoji};
    return{kind:"pose",pose:p,notes:it.notes||"",breaths:it.custom_breaths||""};});
  closeModal();renderCanvas();toast("Template loaded");
}

/* ---------- THEME ---------- */
$("b_theme").onclick=openTheme;
function openTheme(){
  const opts=[["classic","Classic","Serif headings, rose accent"],["minimal","Minimal","Clean monochrome"],["botanical","Botanical","Sage accent"]];
  $("modalRoot").innerHTML=`<div class="ovl" id="ovl"><div class="modal" onclick="event.stopPropagation()">
    <h3 class="serif">Print theme</h3>
    ${opts.map(o=>`<div class="savedrow" data-t="${o[0]}"><div style="flex:1"><div style="font-weight:500;color:var(--head)">${o[1]}${seqTheme===o[0]?" \u2713":""}</div><div style="color:var(--muted);font-size:12px">${o[2]}</div></div></div>`).join("")}
    <div style="color:var(--muted);font-size:12px;margin-top:6px">Themes style the printed handout. Save the sequence to keep your choice.</div>
    <button class="btn ghost" style="margin-top:12px;width:100%" onclick="closeModal()">Close</button></div></div>`;
  $("ovl").onclick=closeModal;
  $("modalRoot").querySelectorAll(".savedrow").forEach(el=>el.onclick=()=>{applyTheme(el.dataset.t);closeModal();toast("Theme: "+el.dataset.t);});
}
function applyTheme(t){seqTheme=t||"classic";document.body.classList.remove("theme-classic","theme-minimal","theme-botanical");document.body.classList.add("theme-"+seqTheme);}
function updatePrintHead(){const el=$("printHead");if(!el)return;const meta=[$("m_level").value,$("m_duration").value,$("m_style").value].filter(Boolean).join(" \u00b7 ");el.innerHTML=`<h1>${esc($("m_name").value||"My Yoga Sequence")}</h1><div class="meta">${esc(meta)}</div>`+($("m_description").value?`<div class="meta" style="margin-top:6px">${esc($("m_description").value)}</div>`:"");}
window.openTemplates=openTemplates;window.saveAsTemplate=saveAsTemplate;window.loadTemplate=loadTemplate;window.openTheme=openTheme;
loadDesign();init();
</script>
